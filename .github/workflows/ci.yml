name: ci

on:
  push:
    branches: [main]
  pull_request:

# A single in-flight run per ref keeps the queue clean when force-pushing.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build + test (linux)
    # Linux runner is non-negotiable: we are testing a glibc NSS plugin and
    # the integration job below `dlopen`s the resulting `.so` from `getent`.
    # Darwin can't run that path at all (no NSS).
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          # Match the rust + cargo versions the dev shell exposes; pinning the
          # nix-action's channel keeps CI reproducible across nixpkgs drift.
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Cargo deps and the rust toolchain together are the bulk of CI cost;
      # caching the cargo registry across runs cuts cold-start time roughly
      # in half. The nix store cache is handled by cachix below.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo test
        # We run via `nix shell` rather than rustup so the toolchain matches
        # the nix-built artifact exactly. No version skew.
        run: nix shell nixpkgs#cargo nixpkgs#rustc -c cargo test --all-targets

      - name: cargo clippy
        run: nix shell nixpkgs#cargo nixpkgs#rustc nixpkgs#clippy -c cargo clippy --all-targets -- -D warnings

      - name: nix build (portable release artifact)
        # Build the *portable* output — interpreter patched to
        # `/lib64/ld-linux-x86-64.so.2` so the daemon binary runs on stock
        # Linux. Nix-native consumers (e.g. the devenv image's flake)
        # reference `.#packages.<sys>.tailscale-nss` directly via flake
        # input and get the un-patched variant; CI never uploads that.
        run: nix build .#packages.x86_64-linux.portable --print-build-logs

      - name: confirm NSS exports
        # If the build succeeds but doesn't export the symbols glibc looks
        # for, the plugin is silently broken at runtime — `getent passwd`
        # just returns the static /etc/passwd. Catch that here.
        run: |
          set -e
          missing=
          for sym in \
            _nss_tailscale_getpwnam_r \
            _nss_tailscale_getpwuid_r \
            _nss_tailscale_getpwent_r \
            _nss_tailscale_setpwent \
            _nss_tailscale_endpwent \
            _nss_tailscale_getgrnam_r \
            _nss_tailscale_getgrgid_r \
            _nss_tailscale_getgrent_r \
            _nss_tailscale_setgrent \
            _nss_tailscale_endgrent
          do
            if ! nm -D --defined-only result/lib/libnss_tailscale.so.2 | grep -q " T $sym$"; then
              missing="$missing $sym"
            fi
          done
          if [ -n "$missing" ]; then
            echo "missing NSS symbols:$missing" >&2
            exit 1
          fi
          echo "all 10 NSS exports present"

      - name: confirm daemon binary loads on stock glibc
        # The point of the `portable` variant: the daemon's PT_INTERP
        # should be `/lib64/ld-linux-x86-64.so.2`, the conventional Linux
        # path, *not* `/nix/store/...glibc/...` which would ENOENT on any
        # non-nix host.
        run: |
          set -e
          test -x result/bin/tailscale-nss-syncd
          file result/bin/tailscale-nss-syncd | grep -q "ELF 64-bit LSB"
          interp=$(readelf -p .interp result/bin/tailscale-nss-syncd | awk '/]/ {print $3}')
          echo "PT_INTERP: $interp"
          [ "$interp" = "/lib64/ld-linux-x86-64.so.2" ] || {
            echo "FAIL: portable variant's interpreter is not the standard Linux path" >&2
            exit 1
          }
          # Sanity: ldd against the runner's glibc (Ubuntu 24.04) must
          # resolve everything. If it doesn't, the binary won't load on
          # any real Linux.
          ldd result/bin/tailscale-nss-syncd | tee /tmp/ldd.txt
          ! grep -q "not found" /tmp/ldd.txt

      # Stash the artifacts so the integration job can pick them up without
      # rebuilding. The sources are just a couple of MB; keeping them as
      # workflow artifacts is much cheaper than recompiling Rust.
      #
      # Stage to a flat directory first because:
      #   1. `result/` is a symlink into /nix/store, and upload-artifact has
      #      a long history of mishandling symlinks (especially across the
      #      v3 → v4 migration).
      #   2. v4 derives the archive layout from the least-common-ancestor of
      #      `path:` entries, which means the archive ends up with
      #      `lib/libnss_tailscale.so.2` and `bin/tailscale-nss-syncd`
      #      subdirs — fine, but more brittle than just naming the files.
      - name: stage artifacts
        run: |
          mkdir -p stage
          cp -L result/lib/libnss_tailscale.so.2 stage/
          cp -L result/bin/tailscale-nss-syncd stage/
          chmod +x stage/*

      - uses: actions/upload-artifact@v4
        with:
          name: tailscale-nss-build
          path: stage/
          retention-days: 7

  integration:
    name: getent against mock tailscaled
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: tailscale-nss-build
          path: artifacts

      - name: install plugin where glibc looks for it
        # Ubuntu runners use the distro's glibc; the convention is
        # `/lib/x86_64-linux-gnu/libnss_<name>.so.2`. `chmod +x` because
        # `actions/upload-artifact` strips the execute bit on tarball
        # round-trip and glibc won't load a non-executable .so.
        run: |
          sudo install -m 0755 \
            artifacts/libnss_tailscale.so.2 \
            /lib/x86_64-linux-gnu/libnss_tailscale.so.2
          sudo ldconfig -n /lib/x86_64-linux-gnu/

      - name: register plugin in nsswitch.conf
        # Append `tailscale` after `files` so system users (root, the
        # runner's own account, etc.) still resolve via the canonical path.
        # If our plugin breaks, login still works.
        run: |
          sudo sed -i \
            's/^passwd:.*$/passwd:    files tailscale systemd/; s/^group:.*$/group:    files tailscale systemd/' \
            /etc/nsswitch.conf
          cat /etc/nsswitch.conf

      - name: stand up mock tailscaled
        # The script lives under tests/ so it's also usable for manual
        # local NSS testing without joining a real tailnet. Backgrounded
        # here; the cleanup step kills it.
        run: |
          sudo mkdir -p /var/run/tailscale
          sudo chmod 0755 /var/run/tailscale
          sudo nohup python3 tests/mock_tailscaled.py \
            --socket /var/run/tailscale/tailscaled.sock \
            >/tmp/mock_tailscaled.log 2>&1 &
          for _ in $(seq 50); do
            [ -S /var/run/tailscale/tailscaled.sock ] && break
            sleep 0.1
          done
          test -S /var/run/tailscale/tailscaled.sock

      - name: getent passwd alice resolves via plugin
        # The actual "does it work end-to-end" assertion. `getent passwd`
        # on a username NOT in /etc/passwd will only return non-empty if
        # an NSS plugin synthesizes it — and the only one that should be
        # answering is ours.
        env:
          TAILSCALE_NSS_DOMAIN: dialo.ai
        run: |
          set -e

          # Sanity: alice is NOT in /etc/passwd, so any successful lookup
          # below must have come through our plugin.
          if grep -q '^alice:' /etc/passwd; then
            echo "alice already in /etc/passwd; test would be meaningless" >&2
            exit 1
          fi

          # The plugin synthesizes a fully deterministic passwd row, so we
          # compare against the *exact* expected line. UIDs come from
          # FNV-1a of the email — same constants as `src/uid.rs` and the
          # `expected_alice`/`expected_bob` unit tests in that file. If the
          # hash algorithm or UID base ever changes, those Rust tests fail
          # first (loudly, on every cargo test); this assertion picks up
          # the same drift one layer up.
          assert_eq() {
            if [ "$2" != "$3" ]; then
              echo "passwd row mismatch for $1:" >&2
              echo "  expected: $2" >&2
              echo "  got:      $3" >&2
              exit 1
            fi
          }

          assert_eq alice \
            "alice:x:109535949:109535949:alice@dialo.ai:/home/alice:/bin/bash" \
            "$(getent passwd alice)"

          assert_eq bob \
            "bob:x:1110256801:1110256801:bob@dialo.ai:/home/bob:/bin/bash" \
            "$(getent passwd bob)"

          # Cross-domain stranger must NOT resolve (TAILSCALE_NSS_DOMAIN=dialo.ai).
          if getent passwd stranger >/dev/null 2>&1; then
            echo "domain filter broken: stranger@other.com leaked through" >&2
            exit 1
          fi

      - name: getent passwd by uid resolves
        env:
          TAILSCALE_NSS_DOMAIN: dialo.ai
        run: |
          set -e
          back=$(getent passwd 109535949)
          expected="alice:x:109535949:109535949:alice@dialo.ai:/home/alice:/bin/bash"
          if [ "$back" != "$expected" ]; then
            echo "uid->name lookup mismatch:" >&2
            echo "  expected: $expected" >&2
            echo "  got:      $back" >&2
            exit 1
          fi

      - name: cleanup mock tailscaled
        if: always()
        run: |
          sudo pkill -f mock_tailscaled.py || true
          sudo rm -f /var/run/tailscale/tailscaled.sock
